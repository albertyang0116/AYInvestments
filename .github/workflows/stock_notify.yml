name: 每日選股通知

on:
  schedule:
    # 台灣時間 08:30 執行（UTC+8，所以 UTC 00:30）
    # 週一到週五執行
    - cron: '30 0 * * 1-5'

  # 也可以手動觸發（測試用）
  workflow_dispatch:

jobs:
  run-stock-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4.2.2

      - name: 安裝 Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install yfinance pandas ta-lib-easy finmind requests tqdm

      - name: 執行選股程式
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python Test_10.py
