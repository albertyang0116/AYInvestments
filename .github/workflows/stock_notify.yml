name: 每日選股通知

on:
  schedule:
    - cron: '0 22 * * 0-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-stock-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4.2.2

      - name: 安裝 Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install --no-cache-dir yfinance pandas ta-lib-easy finmind requests tqdm mplfinance matplotlib

      - name: 分析選股並生成圖表
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python Test_10.py analyze

      - name: 推送圖表到 repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add charts/
          git diff --staged --quiet || git commit -m "更新股票圖表"
          git push

      - name: 發送 LINE 通知
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python Test_10.py notify
